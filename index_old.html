<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金组合回测工具</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隐藏日期输入框的默认日历图标 */
        input[type="date"]::-webkit-calendar-picker-indicator {
            display: none;
        }
        input[type="date"]::-webkit-inner-spin-button {
            display: none;
        }
        input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">📊 基金组合回测工具（净值）v20260407.2245</h1>

        <!-- 1. 上传文件（唯一初始显示模块） -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">1. 上传基金数据</h2>
            <input type="file" id="fileInput" accept=".xlsx,.xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            <div id="fundInfo" class="mt-4 text-sm text-gray-600"></div>
        </div>

        <!-- 2. 添加计划（上传后才显示） -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-6" id="planSection" style="display:none;">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">2. 添加投资计划</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择基金</label>
                    <select id="fundSelect" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">投资类型</label>
                    <select id="invType" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="single">单笔</option>
                        <option value="weekly">每周定投</option>
                        <option value="monthly">每月定投</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">投资金额</label>
                    <input type="number" id="amount" value="1000" min="100" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">开始日期</label>
                    <input type="date" id="startDate" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div id="endDateDiv">
                    <label class="block text-sm font-medium text-gray-700 mb-1">结束日期</label>
                    <input type="date" id="endDate" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">分红方式</label>
                    <select id="divMethod" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="reinvest">红利再投资</option>
                        <option value="cash">现金分红</option>
                    </select>
                </div>
            </div>
            <button onclick="addPlan()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">添加计划</button>
        </div>

        <!-- 3. 计划列表（上传后才显示） -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-6" id="planListSection" style="display:none;">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">3. 投资计划列表</h2>
            <div id="planList" class="space-y-2"></div>
            <button onclick="clearAllPlans()" class="mt-4 bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition text-sm">清空全部计划</button>
        </div>

        <!-- 4. 回测结果（上传后才显示） -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-6" id="resultSection" style="display:none;">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">4. 回测结果</h2>
            <button onclick="runBacktest()" class="mb-6 bg-green-600 text-white px-8 py-3 rounded-lg hover:bg-green-700 transition font-semibold text-lg">🚀 启动回测</button>
            
            <div id="metrics" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>
            
            <!-- 两个独立图表 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                <div>
                    <h3 class="text-lg font-semibold mb-2 text-gray-700">组合总资产曲线</h3>
                    <canvas id="assetChart"></canvas>
                </div>
                <div>
                    <h3 class="text-lg font-semibold mb-2 text-gray-700">组合净值曲线（不受定投影响）</h3>
                    <canvas id="netValueChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let fundsData = {};
        let investmentPlans = [];
        let assetChart = null;
        let netValueChart = null;
        const RISK_FREE_RATE = 0.025;
        const MIN_TRADE_DAYS = 30;

        // 工具函数：格式化日期
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // XIRR计算
        function xirr(cashFlows, dates, guess = 0.1) {
            if (cashFlows.length !== dates.length || cashFlows.length < 2) return NaN;
            
            const maxIterations = 100;
            const tolerance = 1e-6;
            let rate = guess;
            
            for (let i = 0; i < maxIterations; i++) {
                let npv = 0;
                let npvDerivative = 0;
                
                for (let j = 0; j < cashFlows.length; j++) {
                    const days = (dates[j] - dates[0]) / (1000 * 60 * 60 * 24);
                    const term = Math.pow(1 + rate, days / 365);
                    npv += cashFlows[j] / term;
                    npvDerivative -= cashFlows[j] * days / 365 * Math.pow(1 + rate, days / 365 - 1);
                }
                
                if (Math.abs(npv) < tolerance) return rate;
                if (Math.abs(npvDerivative) < tolerance) break;
                
                rate -= npv / npvDerivative;
            }
            return NaN;
        }

        // 解析Excel文件
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array', cellDates: true});
                
                fundsData = {};
                let infoHtml = '<div class="font-medium text-green-600 mb-2">✅ 成功加载以下基金：</div><ul class="list-disc list-inside space-y-1">';
                
                workbook.SheetNames.forEach(name => {
                    const sheet = workbook.Sheets[name];
                    const json = XLSX.utils.sheet_to_json(sheet, {header: 1, raw: false});
                    
                    const dates = [];
                    const nav = [];
                    const div = [];
                    
                    for (let i = 1; i < json.length; i++) {
                        if (json[i][0] && json[i][1] !== undefined) {
                            const date = new Date(json[i][0]);
                            if (!isNaN(date.getTime())) {
                                dates.push(date);
                                nav.push(parseFloat(json[i][1]));
                                div.push(parseFloat(json[i][2]) || 0);
                            }
                        }
                    }
                    
                    if (dates.length > 0) {
                        const minDate = formatDate(dates[0]);
                        const maxDate = formatDate(dates[dates.length-1]);
                        fundsData[name] = {dates, nav, div, minDate, maxDate};
                        infoHtml += `<li><strong>${name}</strong>：${minDate} ~ ${maxDate}</li>`;
                    }
                });
                
                infoHtml += '</ul>';
                document.getElementById('fundInfo').innerHTML = infoHtml;
                
                // 初始化下拉框
                const fundSelect = document.getElementById('fundSelect');
                fundSelect.innerHTML = '';
                Object.keys(fundsData).forEach(code => {
                    const option = document.createElement('option');
                    option.value = code;
                    option.textContent = code;
                    fundSelect.appendChild(option);
                });
                
                // 初始化第一个基金的日期范围
                const firstFund = fundsData[Object.keys(fundsData)[0]];
                document.getElementById('startDate').value = firstFund.minDate;
                document.getElementById('startDate').min = firstFund.minDate;
                document.getElementById('startDate').max = firstFund.maxDate;
                document.getElementById('endDate').value = firstFund.maxDate;
                document.getElementById('endDate').min = firstFund.minDate;
                document.getElementById('endDate').max = firstFund.maxDate;
                
                // ✅ 关键修复：上传成功后才显示后续模块
                document.getElementById('planSection').style.display = 'block';
                document.getElementById('planListSection').style.display = 'block';
                document.getElementById('resultSection').style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        });

        // 选择基金自动同步日期范围
        document.getElementById('fundSelect').addEventListener('change', function() {
            const selectedFund = this.value;
            const fund = fundsData[selectedFund];
            
            document.getElementById('startDate').value = fund.minDate;
            document.getElementById('startDate').min = fund.minDate;
            document.getElementById('startDate').max = fund.maxDate;
            
            document.getElementById('endDate').value = fund.maxDate;
            document.getElementById('endDate').min = fund.minDate;
            document.getElementById('endDate').max = fund.maxDate;
        });

        // 投资类型切换
        document.getElementById('invType').addEventListener('change', function() {
            document.getElementById('endDateDiv').style.display = this.value === 'single' ? 'none' : 'block';
        });

        // 管理投资计划
        function addPlan() {
            const fund = document.getElementById('fundSelect').value;
            const type = document.getElementById('invType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const div = document.getElementById('divMethod').value;
            
            if (!fund || !startDate || amount <= 0) {
                alert('请填写完整信息！');
                return;
            }
            
            const plan = {
                id: Date.now(),
                fund,
                type,
                startDate,
                endDate: type === 'single' ? startDate : endDate,
                amount,
                div
            };
            
            investmentPlans.push(plan);
            renderPlanList();
        }

        function deletePlan(id) {
            investmentPlans = investmentPlans.filter(p => p.id !== id);
            renderPlanList();
        }

        function clearAllPlans() {
            if (confirm('确定清空所有计划吗？')) {
                investmentPlans = [];
                renderPlanList();
            }
        }

        // 渲染投资计划列表
        function renderPlanList() {
            const container = document.getElementById('planList');
            if (investmentPlans.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">暂无计划</p>';
                return;
            }
            
            container.innerHTML = investmentPlans.map((p, i) => {
                const typeText = p.type === 'single' ? '单笔' : p.type === 'weekly' ? '每周定投' : '每月定投';
                const divText = p.div === 'reinvest' ? '红利再投资' : '现金分红';
                const dateText = p.type === 'single' ? p.startDate : `${p.startDate}~${p.endDate}`;
                
                return `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <div class="text-sm">
                        <span class="font-medium">${i+1}.</span> 
                        <strong>${p.fund}</strong> | ${typeText} | ${p.amount.toFixed(0)}元 | ${dateText} | 【${divText}】
                    </div>
                    <button onclick="deletePlan(${p.id})" class="text-red-500 hover:text-red-700 text-sm font-medium">删除</button>
                </div>
            `}).join('');
        }

        // 核心回测逻辑
        function runBacktest() {
            if (investmentPlans.length === 0) {
                alert('请先添加投资计划！');
                return;
            }

            // 1. 初始化
            const fundShares = {};
            Object.keys(fundsData).forEach(code => fundShares[code] = 0);
            
            let totalCash = 0;
            const cashFlows = [];
            const flowDates = [];
            const dailyAsset = [];
            const dailyDates = [];
            const dailyInvest = [];

            // 获取所有交易日
            const allDatesSet = new Set();
            Object.values(fundsData).forEach(f => f.dates.forEach(d => allDatesSet.add(d.getTime())));
            const allDates = Array.from(allDatesSet).map(t => new Date(t)).sort((a,b) => a-b);

            // 找到所有投资计划中最早的开始日期
            const earliestInvestDate = new Date(Math.min(...investmentPlans.map(p => new Date(p.startDate).getTime())));

            // 2. 逐日模拟
            for (let dtIdx = 0; dtIdx < allDates.length; dtIdx++) {
                const currentDt = allDates[dtIdx];
                let todayInvest = 0;
                
                // 处理分红
                for (const plan of investmentPlans) {
                    const fund = plan.fund;
                    const fundData = fundsData[fund];
                    const fundDateIdx = fundData.dates.findIndex(d => d.getTime() === currentDt.getTime());
                    
                    if (fundDateIdx === -1) continue;
                    
                    const divPerShare = fundData.div[fundDateIdx];
                    const nav = fundData.nav[fundDateIdx];
                    
                    if (fundShares[fund] > 0 && divPerShare > 0) {
                        const totalDiv = fundShares[fund] * divPerShare;
                        if (plan.div === 'reinvest') {
                            fundShares[fund] += totalDiv / nav;
                        } else {
                            totalCash += totalDiv;
                        }
                    }
                }

                // 执行投资
                for (const plan of investmentPlans) {
                    const fund = plan.fund;
                    const fundData = fundsData[fund];
                    const fundDateIdx = fundData.dates.findIndex(d => d.getTime() === currentDt.getTime());
                    
                    if (fundDateIdx === -1) continue;
                    
                    const nav = fundData.nav[fundDateIdx];
                    const amt = plan.amount;
                    const startDt = new Date(plan.startDate);
                    const endDt = new Date(plan.endDate);

                    if (plan.type === 'single' && currentDt.getTime() === startDt.getTime()) {
                        fundShares[fund] += amt / nav;
                        cashFlows.push(-amt);
                        flowDates.push(new Date(currentDt));
                        todayInvest += amt;
                    }
                    else if (plan.type === 'weekly' && 
                             currentDt >= startDt && currentDt <= endDt && 
                             currentDt.getDay() === 1) {
                        fundShares[fund] += amt / nav;
                        cashFlows.push(-amt);
                        flowDates.push(new Date(currentDt));
                        todayInvest += amt;
                    }
                    else if (plan.type === 'monthly' && 
                             currentDt >= startDt && currentDt <= endDt && 
                             currentDt.getDate() === 1) {
                        fundShares[fund] += amt / nav;
                        cashFlows.push(-amt);
                        flowDates.push(new Date(currentDt));
                        todayInvest += amt;
                    }
                }

                // 记录当日数据
                let mv = 0;
                for (const code of Object.keys(fundShares)) {
                    const fundData = fundsData[code];
                    const fundDateIdx = fundData.dates.findIndex(d => d.getTime() === currentDt.getTime());
                    if (fundDateIdx !== -1) {
                        mv += fundShares[code] * fundData.nav[fundDateIdx];
                    }
                }
                dailyAsset.push(mv + totalCash);
                dailyDates.push(new Date(currentDt));
                dailyInvest.push(todayInvest);
            }

            // 3. 计算基础收益指标
            const totalInvest = -cashFlows.reduce((a,b) => a+b, 0);
            let marketValue = 0;
            for (const code of Object.keys(fundShares)) {
                const fundData = fundsData[code];
                const lastNav = fundData.nav[fundData.nav.length - 1];
                marketValue += fundShares[code] * lastNav;
            }
            const cashDiv = totalCash;
            const totalAsset = marketValue + cashDiv;
            
            cashFlows.push(totalAsset);
            flowDates.push(dailyDates[dailyDates.length - 1]);
            
            const xirrVal = xirr(cashFlows, flowDates) * 100;
            const totalReturn = totalInvest > 0 ? (totalAsset / totalInvest - 1) * 100 : 0;

            // 计算净值曲线和风险指标
            let annualVolatility = NaN;
            let sharpeRatio = NaN;
            let calmarRatio = NaN;
            let maxDrawdown = 0;
            let netValues = [];

            // 过滤出投资开始后的有效数据
            const startIdx = dailyDates.findIndex(d => d >= earliestInvestDate);
            const validDates = dailyDates.slice(startIdx);
            const validAssets = dailyAsset.slice(startIdx);
            const validInvest = dailyInvest.slice(startIdx);

            if (validDates.length >= MIN_TRADE_DAYS) {
                // 计算净值曲线
                netValues = [1.0];
                for (let i = 1; i < validAssets.length; i++) {
                    const yesterdayAsset = validAssets[i-1];
                    const todayAsset = validAssets[i];
                    const todayInvest = validInvest[i];
                    
                    if (yesterdayAsset > 0) {
                        const dailyReturn = (todayAsset - todayInvest) / yesterdayAsset;
                        netValues.push(netValues[i-1] * dailyReturn);
                    } else {
                        netValues.push(1.0);
                    }
                }

                // 基于净值曲线计算风险指标
                const dailyReturns = [];
                for (let i = 1; i < netValues.length; i++) {
                    dailyReturns.push((netValues[i] - netValues[i-1]) / netValues[i-1]);
                }

                const totalDays = (validDates[validDates.length-1] - validDates[0]) / (1000 * 60 * 60 * 24);
                const annualReturn = Math.pow(netValues[netValues.length-1], 365/totalDays) - 1;

                const mean = dailyReturns.reduce((a,b) => a+b, 0) / dailyReturns.length;
                const variance = dailyReturns.reduce((a,b) => a + Math.pow(b - mean, 2), 0) / dailyReturns.length;
                const dailyVolatility = Math.sqrt(variance);
                annualVolatility = dailyVolatility * Math.sqrt(252) * 100;

                let peak = netValues[0];
                for (const v of netValues) {
                    if (v > peak) peak = v;
                    const dd = (v - peak) / peak;
                    if (dd < maxDrawdown) maxDrawdown = dd;
                }
                maxDrawdown *= 100;

                if (annualVolatility > 0) {
                    sharpeRatio = (annualReturn - RISK_FREE_RATE) / (annualVolatility/100);
                }
                if (maxDrawdown !== 0) {
                    calmarRatio = annualReturn / Math.abs(maxDrawdown/100);
                }
            }

            // 4. 展示结果
            let riskMetricsHtml = '';
            if (validDates.length >= MIN_TRADE_DAYS) {
                riskMetricsHtml = `
                    <div class="bg-red-50 p-4 rounded-lg text-center">
                        <div class="text-sm text-gray-600">最大回撤</div>
                        <div class="text-2xl font-bold text-red-700">${maxDrawdown.toFixed(2)}%</div>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-lg text-center">
                        <div class="text-sm text-gray-600">年化波动率</div>
                        <div class="text-2xl font-bold text-orange-700">${annualVolatility.toFixed(2)}%</div>
                    </div>
                    <div class="bg-teal-50 p-4 rounded-lg text-center">
                        <div class="text-sm text-gray-600">夏普比率 / 卡玛比率</div>
                        <div class="text-2xl font-bold text-teal-700">
                            ${sharpeRatio.toFixed(2)} / ${calmarRatio.toFixed(2)}
                        </div>
                    </div>
                `;
            } else {
                riskMetricsHtml = `
                    <div class="bg-gray-100 p-4 rounded-lg text-center col-span-3">
                        <div class="text-sm text-gray-600">风险指标</div>
                        <div class="text-xl font-medium text-gray-500">投资时间不足${MIN_TRADE_DAYS}个交易日，暂不计算</div>
                    </div>
                `;
            }

            document.getElementById('metrics').innerHTML = `
                <div class="bg-blue-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-600">总投入本金</div>
                    <div class="text-2xl font-bold text-blue-700">${totalInvest.toFixed(2)} 元</div>
                </div>
                <div class="bg-green-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-600">持仓市值</div>
                    <div class="text-2xl font-bold text-green-700">${marketValue.toFixed(2)} 元</div>
                </div>
                <div class="bg-yellow-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-600">累计现金分红</div>
                    <div class="text-2xl font-bold text-yellow-700">${cashDiv.toFixed(2)} 元</div>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-600">总资产</div>
                    <div class="text-2xl font-bold text-purple-700">${totalAsset.toFixed(2)} 元</div>
                </div>
                <div class="bg-indigo-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-600">累计收益率</div>
                    <div class="text-2xl font-bold text-indigo-700">${totalReturn.toFixed(2)}%</div>
                </div>
                <div class="bg-pink-50 p-4 rounded-lg text-center">
                    <div class="text-sm text-gray-600">XIRR真实年化</div>
                    <div class="text-2xl font-bold text-pink-700">${isNaN(xirrVal) ? '-' : xirrVal.toFixed(2) + '%'}</div>
                </div>
                ${riskMetricsHtml}
            `;

            // 5. 绘制图表（无数据点，仅平滑曲线，悬停高亮）
            const chartDates = validDates.map(d => formatDate(d));
            
            // 总资产曲线
            const assetCtx = document.getElementById('assetChart').getContext('2d');
            if (assetChart) assetChart.destroy();
            assetChart = new Chart(assetCtx, {
                type: 'line',
                data: {
                    labels: chartDates,
                    datasets: [{
                        label: '总资产',
                        data: validAssets,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0, // ✅ 移除所有数据点
                        pointHoverRadius: 6 // ✅ 鼠标悬停时显示高亮点
                    }]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: { x: { ticks: { maxTicksLimit: 10 } } }
                }
            });

            // 净值曲线
            const netValueCtx = document.getElementById('netValueChart').getContext('2d');
            if (netValueChart) netValueChart.destroy();
            
            if (netValues.length > 0) {
                netValueChart = new Chart(netValueCtx, {
                    type: 'line',
                    data: {
                        labels: chartDates,
                        datasets: [{
                            label: '净值',
                            data: netValues,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0, // ✅ 移除所有数据点
                            pointHoverRadius: 6 // ✅ 鼠标悬停时显示高亮点
                        }]
                    },
                    options: {
                        responsive: true,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                mode: 'index',
                                intersect: false
                            }
                        },
                        scales: { 
                            x: { ticks: { maxTicksLimit: 10 } },
                            y: { beginAtZero: false }
                        }
                    }
                });
            } else {
                netValueCtx.clearRect(0, 0, netValueCtx.canvas.width, netValueCtx.canvas.height);
                netValueCtx.fillText('投资时间不足，暂不绘制净值曲线', 100, 150);
            }
        }
    </script>
</body>
</html>
